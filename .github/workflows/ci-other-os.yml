name: CI (Other OS)

on:
  workflow_dispatch:
  # Also run on PRs to validate cross-platform compatibility
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test-fast:
    name: Test (MVP fast) (${{ matrix.os }})
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos
            runs_on: macos-13
          - os: windows
            runs_on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt,clippy

    - name: Cache cargo registry and target
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Check formatting
      run: cargo fmt --all -- --check

    - name: Compile (check)
      run: cargo check --workspace --all-targets --no-default-features

    - name: Run clippy
      run: cargo clippy --all-targets --no-default-features -- -D warnings

    - name: Run doctests
      run: cargo test --doc --workspace --no-default-features

    - name: Install cargo-nextest
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-nextest

    - name: Run MVP fast tests
      run: cargo nextest run --profile dev-fast --no-default-features
