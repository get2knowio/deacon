name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  # Minimum line coverage required for CI to pass (used by coverage job)
  MIN_COVERAGE: "80"

jobs:
  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Install Rust toolchain (fmt + clippy)
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt,clippy
    - name: Cache cargo registry and target
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-
    - name: Check formatting
      run: cargo fmt --all -- --check
    - name: Compile (check)
      run: cargo check --workspace --all-targets
    - name: Run clippy
      run: cargo clippy --all-targets -- -D warnings
    - name: Run doctests
      run: cargo test --doc --workspace

  test:
    name: Test (nextest fast profile) (ubuntu)
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo registry and target
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-nextest-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-nextest-
          ${{ runner.os }}-cargo-

    - name: Install cargo-nextest
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-nextest

    - name: Ensure Docker is running (Ubuntu)
      run: |
        sudo service docker start
        docker info

    - name: Run nextest fast profile via Makefile
      run: make test-nextest-fast

  smoke:
    name: Smoke tests (ubuntu)
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Enable network tests for integration tests that require OCI registry access
      DEACON_NETWORK_TESTS: "1"
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo registry and target
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Ensure Docker is running
      run: |
        sudo service docker start
        docker info

    - name: Acquire GHCR bearer token (read-only)
      run: |
        set -euo pipefail
        echo "Requesting multi-scope GHCR token..."
        TOKEN_URL="https://ghcr.io/token?service=ghcr.io\
        &scope=repository:devcontainers/features/node:pull\
        &scope=repository:devcontainers/features/common-utils:pull\
        &scope=repository:devcontainers/features/docker-in-docker:pull\
        &scope=repository:devcontainers/features/python:pull\
        &scope=repository:devcontainers/features/git:pull"
        TOKEN=$(curl -fsSL "$TOKEN_URL" | python3 -c 'import sys,json; print(json.load(sys.stdin).get("token",""))')
        if [[ -z "$TOKEN" || "$TOKEN" == "null" ]]; then
          echo "Failed to acquire GHCR token" >&2
          exit 1
        fi
        echo "DEACON_REGISTRY_TOKEN=$TOKEN" >> "$GITHUB_ENV"

    - name: Run smoke test suite via Makefile (nextest)
      run: make test-nextest-smoke

    - name: Upload timing artifacts (smoke)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: nextest-smoke-timing-ubuntu
        path: artifacts/nextest/smoke-timing.json
        if-no-files-found: warn

    - name: Generate smoke timing summary
      if: always()
      run: |
        if [[ -f artifacts/nextest/smoke-timing.json ]]; then
          echo "## Nextest Smoke Timing Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          smoke_duration=$(jq -r '.duration_seconds // 0' artifacts/nextest/smoke-timing.json)
          smoke_timestamp=$(jq -r '.timestamp_utc // "N/A"' artifacts/nextest/smoke-timing.json)
          echo "- **Profile**: ci-smoke" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration**: ${smoke_duration}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp**: ${smoke_timestamp}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
        fi

  nextest-ci:
    name: Nextest CI (ubuntu)
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Enable network tests for integration tests that require OCI registry access
      DEACON_NETWORK_TESTS: "1"
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo registry and target
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-nextest-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-nextest-
          ${{ runner.os }}-cargo-

    - name: Install cargo-nextest
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-nextest

    - name: Ensure Docker is running
      run: |
        sudo service docker start
        docker info

    - name: Acquire GHCR bearer token (read-only)
      run: |
        set -euo pipefail
        echo "Requesting multi-scope GHCR token..."
        TOKEN_URL="https://ghcr.io/token?service=ghcr.io\
        &scope=repository:devcontainers/features/node:pull\
        &scope=repository:devcontainers/features/common-utils:pull\
        &scope=repository:devcontainers/features/docker-in-docker:pull\
        &scope=repository:devcontainers/features/python:pull\
        &scope=repository:devcontainers/features/git:pull"
        TOKEN=$(curl -fsSL "$TOKEN_URL" | python3 -c 'import sys,json; print(json.load(sys.stdin).get("token",""))')
        if [[ -z "$TOKEN" || "$TOKEN" == "null" ]]; then
          echo "Failed to acquire GHCR token" >&2
          exit 1
        fi
        echo "DEACON_REGISTRY_TOKEN=$TOKEN" >> "$GITHUB_ENV"

    - name: Run nextest CI profile
      run: make test-nextest-ci

    - name: Upload timing artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: nextest-ci-timing-ubuntu
        path: artifacts/nextest/ci-timing.json
        if-no-files-found: warn

    - name: Generate timing comparison summary
      if: always()
      run: |
        if [[ -f artifacts/nextest/ci-timing.json ]]; then
          echo "## Nextest CI Timing Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          ci_duration=$(jq -r '.duration_seconds // 0' artifacts/nextest/ci-timing.json)
          ci_timestamp=$(jq -r '.timestamp_utc // "N/A"' artifacts/nextest/ci-timing.json)
          echo "- **Profile**: ci" >> $GITHUB_STEP_SUMMARY
          echo "- **Duration**: ${ci_duration}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp**: ${ci_timestamp}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          # If baseline exists, show improvement
          if [[ -f artifacts/nextest/baseline-timing.json ]]; then
            baseline_duration=$(jq -r '.duration_seconds // 0' artifacts/nextest/baseline-timing.json)
            if [[ $baseline_duration -gt 0 ]]; then
              improvement=$(awk "BEGIN {printf \"%.1f\", (1 - $ci_duration / $baseline_duration) * 100}")
              echo "- **Improvement**: ${improvement}% faster than baseline (${baseline_duration}s → ${ci_duration}s)" >> $GITHUB_STEP_SUMMARY
            fi
          fi
        fi

      long-running:
        name: Long-running integration tests (nextest) (ubuntu)
        needs: lint
        runs-on: ubuntu-latest
        timeout-minutes: 90
        env:
          # Enable network tests for integration tests that require OCI registry access
          DEACON_NETWORK_TESTS: "1"
        steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Install Rust toolchain
          uses: dtolnay/rust-toolchain@stable

        - name: Cache cargo registry and target
          uses: actions/cache@v4
          with:
            path: |
              ~/.cargo/registry
              ~/.cargo/git
              target
            key: ${{ runner.os }}-cargo-nextest-${{ hashFiles('**/Cargo.lock') }}-long
            restore-keys: |
              ${{ runner.os }}-cargo-nextest-
              ${{ runner.os }}-cargo-

        - name: Install cargo-nextest
          uses: taiki-e/install-action@v2
          with:
            tool: cargo-nextest

        - name: Ensure Docker is running
          run: |
            sudo service docker start
            docker info

        - name: Acquire GHCR bearer token (read-only)
          run: |
            set -euo pipefail
            echo "Requesting multi-scope GHCR token..."
            TOKEN_URL="https://ghcr.io/token?service=ghcr.io\
            &scope=repository:devcontainers/features/node:pull\
            &scope=repository:devcontainers/features/common-utils:pull\
            &scope=repository:devcontainers/features/docker-in-docker:pull\
            &scope=repository:devcontainers/features/python:pull\
            &scope=repository:devcontainers/features/git:pull"
            TOKEN=$(curl -fsSL "$TOKEN_URL" | python3 -c 'import sys,json; print(json.load(sys.stdin).get("token",""))')
            if [[ -z "$TOKEN" || "$TOKEN" == "null" ]]; then
              echo "Failed to acquire GHCR token" >&2
              exit 1
            fi
            echo "DEACON_REGISTRY_TOKEN=$TOKEN" >> "$GITHUB_ENV"

        - name: Run nextest long-running profile via Makefile
          run: make test-nextest-long-running

        - name: Upload timing artifacts (long-running)
          if: always()
          uses: actions/upload-artifact@v4
          with:
            name: nextest-long-running-timing-ubuntu
            path: artifacts/nextest/long-running-timing.json
            if-no-files-found: warn

        - name: Generate long-running timing summary
          if: always()
          run: |
            if [[ -f artifacts/nextest/long-running-timing.json ]]; then
              echo "## Nextest Long-running Timing Results" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              lr_duration=$(jq -r '.duration_seconds // 0' artifacts/nextest/long-running-timing.json)
              lr_timestamp=$(jq -r '.timestamp_utc // "N/A"' artifacts/nextest/long-running-timing.json)
              echo "- **Profile**: long-running" >> $GITHUB_STEP_SUMMARY
              echo "- **Duration**: ${lr_duration}s" >> $GITHUB_STEP_SUMMARY
              echo "- **Timestamp**: ${lr_timestamp}" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi

  test-podman:
    name: Podman runtime tests (ubuntu)
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true  # Non-blocking while we stabilize Podman support
    env:
      # Enable network tests for integration tests that require OCI registry access
      DEACON_NETWORK_TESTS: "1"
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo registry and target
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-podman-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-podman-
          ${{ runner.os }}-cargo-

    - name: Verify Podman installation
      run: |
        podman --version
        podman info

    - name: Start Podman system service
      run: |
        # Start podman socket for Docker-compatible API
        sudo systemctl start podman.socket || true
        # Verify podman is working
        podman ps || echo "Podman ps failed, continuing with CLI-only mode"

    - name: Build with Podman support
      run: cargo build --verbose

    - name: Run runtime selection tests with Podman (via Makefile)
      env:
        DEACON_RUNTIME: podman
      run: |
        echo "Running integration tests with Podman runtime (via Makefile)..."
        make test-podman

    - name: Podman smoke check (already part of `make test-podman`)
      run: echo "Basic Podman smoke check done as part of make test-podman"

  coverage:
    name: Coverage (ubuntu)
    needs: lint
    runs-on: ubuntu-latest
    env:
      # Enable network tests for integration tests that require OCI registry access
      DEACON_NETWORK_TESTS: "1"
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: llvm-tools-preview

    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-llvm-cov

    - name: Cache cargo registry and target
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-llvmcov-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-llvmcov-

    - name: Ensure Docker is running
      run: |
        sudo service docker start
        docker info

    - name: Generate coverage (fail under ${{ env.MIN_COVERAGE }}%)
      run: |
        mkdir -p coverage
        cargo llvm-cov --workspace --lcov --output-path coverage/lcov.info --text --fail-under-lines ${{ env.MIN_COVERAGE }} -- --test-threads=1 | tee -a "$GITHUB_STEP_SUMMARY"

    - name: Upload lcov artifact
      uses: actions/upload-artifact@v4
      with:
        name: coverage-lcov
        path: coverage/lcov.info

    - name: Upload coverage to Coveralls
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        path-to-lcov: coverage/lcov.info
