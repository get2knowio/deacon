name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily 07:00 UTC — surfaces new advisories without spamming PRs.
    # Only the `security` job runs on this trigger; see job-level `if` guards.
    - cron: '0 7 * * *'

env:
  CARGO_TERM_COLOR: always

jobs:
  security:
    name: Security (cargo deny)
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install cargo-deny
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-deny

    - name: Run cargo deny
      run: cargo deny check

  lint:
    name: Lint (fmt + clippy)
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL 2>/dev/null || true

    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt,clippy

    - name: Cache cargo registry and target
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Check formatting
      run: cargo fmt --all -- --check

    - name: Compile (check)
      run: cargo check --workspace --all-targets

    - name: Run clippy
      run: cargo clippy --all-targets --all-features -- -D warnings

    - name: Run doctests
      run: cargo test --doc --workspace

  msrv:
    name: MSRV (cargo check)
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL 2>/dev/null || true

    - name: Checkout code
      uses: actions/checkout@v6

    # Pin to the declared MSRV (rust-version in [workspace.package]). If this
    # job fails, either fix the offending code or bump rust-version in lockstep.
    - name: Install MSRV toolchain (1.95)
      uses: dtolnay/rust-toolchain@1.95

    - name: Cache cargo registry and target
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-msrv-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-msrv-
          ${{ runner.os }}-cargo-

    - name: Check on MSRV
      run: cargo check --workspace --all-targets --all-features --locked

  test-fast:
    name: Test (MVP fast) (${{ matrix.os }})
    if: github.event_name != 'schedule'
    needs: lint
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu
            runs_on: ubuntu-latest
          - os: macos
            runs_on: macos-14
          # Windows disabled until bespoke runner with Docker support is available
          # - os: windows
          #   runs_on: windows-latest
    steps:
    - name: Free disk space (Ubuntu)
      if: matrix.os == 'ubuntu'
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL 2>/dev/null || true

    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo registry and target
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-nextest-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-nextest-
          ${{ runner.os }}-cargo-

    - name: Install cargo-nextest
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-nextest

    - name: Run MVP fast tests
      run: cargo nextest run --profile dev-fast --no-default-features

  test-integration:
    name: Test (MVP integration)
    if: github.event_name != 'schedule'
    needs: test-fast
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DEACON_NETWORK_TESTS: "1"
    steps:
    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL 2>/dev/null || true

    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo registry and target
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-nextest-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-nextest-
          ${{ runner.os }}-cargo-

    - name: Install cargo-nextest
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-nextest

    - name: Ensure Docker is running and clean
      run: |
        sudo service docker start
        docker info
        sudo docker system prune -af --volumes
        sudo docker builder prune -af

    - name: Acquire GHCR bearer token (read-only)
      run: |
        set -euo pipefail
        TOKEN_URL="https://ghcr.io/token?service=ghcr.io\
        &scope=repository:devcontainers/features/node:pull\
        &scope=repository:devcontainers/features/common-utils:pull\
        &scope=repository:devcontainers/features/docker-in-docker:pull\
        &scope=repository:devcontainers/features/python:pull\
        &scope=repository:devcontainers/features/git:pull"
        TOKEN=$(curl -fsSL "$TOKEN_URL" | python3 -c 'import sys,json; print(json.load(sys.stdin).get("token",""))')
        if [[ -z "$TOKEN" || "$TOKEN" == "null" ]]; then
          echo "Failed to acquire GHCR token" >&2
          exit 1
        fi
        echo "DEACON_REGISTRY_TOKEN=$TOKEN" >> "$GITHUB_ENV"

    - name: Run MVP integration tests
      run: make test-nextest-mvp-integration

    - name: Upload timing artifacts
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: nextest-mvp-integration-timing
        path: artifacts/nextest/mvp-integration-timing.json
        if-no-files-found: warn
