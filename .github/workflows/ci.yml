name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # Minimum line coverage required for CI to pass (used by coverage job)
  MIN_COVERAGE: "80"

jobs:
  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
    - name: Free disk space (before cache restore)
      run: |
        # Remove pre-installed software to free ~30GB BEFORE cache restore
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL 2>/dev/null || true
        echo "=== Disk space after pre-cleanup ==="
        df -h

    - name: Checkout code
      uses: actions/checkout@v4
    - name: Install Rust toolchain (fmt + clippy)
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt,clippy
    - name: Cache cargo registry and target
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-
    - name: Check formatting
      run: cargo fmt --all -- --check
    - name: Compile (check)
      run: cargo check --workspace --all-targets
    - name: Run clippy
      run: cargo clippy --all-targets -- -D warnings
    - name: Run doctests
      run: cargo test --doc --workspace

  test-fast:
    name: Test (MVP fast)
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Free disk space (before cache restore)
      run: |
        # Remove pre-installed software to free ~30GB BEFORE cache restore
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL 2>/dev/null || true
        echo "=== Disk space after pre-cleanup ==="
        df -h

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo registry and target
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-nextest-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-nextest-
          ${{ runner.os }}-cargo-

    - name: Install cargo-nextest
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-nextest

    - name: Run nextest fast profile (MVP tests)
      run: make test-nextest-fast

  test-integration:
    name: Test (MVP integration)
    needs: [lint, test-fast]  # Serial: fail-fast if unit tests fail
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Enable network tests for integration tests that require OCI registry access
      DEACON_NETWORK_TESTS: "1"
    steps:
    - name: Free disk space (before cache restore)
      run: |
        # Remove pre-installed software to free ~30GB BEFORE cache restore
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL 2>/dev/null || true
        echo "=== Disk space after pre-cleanup ==="
        df -h

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo registry and target
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-nextest-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-nextest-
          ${{ runner.os }}-cargo-

    - name: Install cargo-nextest
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-nextest

    - name: Ensure Docker is running and clean
      run: |
        sudo service docker start
        docker info
        # Clean Docker after cache restore
        sudo docker system prune -af --volumes
        sudo docker builder prune -af
        echo "=== Disk space after Docker cleanup ==="
        df -h

    - name: Acquire GHCR bearer token (read-only)
      run: |
        set -euo pipefail
        echo "Requesting multi-scope GHCR token..."
        TOKEN_URL="https://ghcr.io/token?service=ghcr.io\
        &scope=repository:devcontainers/features/node:pull\
        &scope=repository:devcontainers/features/common-utils:pull\
        &scope=repository:devcontainers/features/docker-in-docker:pull\
        &scope=repository:devcontainers/features/python:pull\
        &scope=repository:devcontainers/features/git:pull"
        TOKEN=$(curl -fsSL "$TOKEN_URL" | python3 -c 'import sys,json; print(json.load(sys.stdin).get("token",""))')
        if [[ -z "$TOKEN" || "$TOKEN" == "null" ]]; then
          echo "Failed to acquire GHCR token" >&2
          exit 1
        fi
        echo "DEACON_REGISTRY_TOKEN=$TOKEN" >> "$GITHUB_ENV"

    - name: Run MVP integration tests (smoke + parity + Docker)
      run: make test-nextest-mvp-integration

    - name: Upload timing artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: nextest-mvp-integration-timing
        path: artifacts/nextest/mvp-integration-timing.json
        if-no-files-found: warn

  # Coverage runs only on main branch pushes to reduce CI time on PRs
  coverage:
    name: Coverage
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: lint
    runs-on: ubuntu-latest
    env:
      DEACON_NETWORK_TESTS: "1"
    steps:
    - name: Free disk space (before cache restore)
      run: |
        # Remove pre-installed software to free ~30GB BEFORE cache restore
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL 2>/dev/null || true
        echo "=== Disk space after pre-cleanup ==="
        df -h

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: llvm-tools-preview

    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-llvm-cov

    - name: Cache cargo registry and target
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-llvmcov-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-llvmcov-

    - name: Ensure Docker is running and clean
      run: |
        sudo service docker start
        docker info
        # Clean Docker after cache restore
        sudo docker system prune -af --volumes
        sudo docker builder prune -af
        echo "=== Disk space after Docker cleanup ==="
        df -h

    - name: Generate coverage (fail under ${{ env.MIN_COVERAGE }}%)
      run: |
        mkdir -p coverage
        cargo llvm-cov --workspace --lcov --output-path coverage/lcov.info --text --fail-under-lines ${{ env.MIN_COVERAGE }} -- --test-threads=1 | tee -a "$GITHUB_STEP_SUMMARY"

    - name: Upload lcov artifact
      uses: actions/upload-artifact@v4
      with:
        name: coverage-lcov
        path: coverage/lcov.info

    - name: Upload coverage to Coveralls
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        path-to-lcov: coverage/lcov.info
