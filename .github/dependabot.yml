version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      rust-minor-patch:
        update-types:
          - minor
          - patch
    ignore:
      # reqwest 0.13 drops the rustls-tls feature and defaults to aws-lc-rs
      # (C/CMake) instead of ring, breaking pure-Rust musl/aarch64 cross-compile.
      # See crates/core/Cargo.toml comment. Bump deliberately, not automatically.
      - dependency-name: reqwest
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch
