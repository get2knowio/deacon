[package]
name = "deacon"
version = "0.1.4"
edition.workspace = true
license.workspace = true
authors.workspace = true

# Disable automatic test discovery to prevent support module from being treated as a test
autotests = false

[dependencies]
deacon-core.workspace = true
clap.workspace = true
anyhow.workspace = true
tracing.workspace = true
tokio = { version = "1.0", features = ["rt", "rt-multi-thread", "macros"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tempfile = "3.12"
sha2 = "0.10"
tar = "0.4"
flate2 = "1"
toml.workspace = true
shell-words.workspace = true
indicatif = "0.17"
atty = "0.2"
console = "0.15"
futures = "0.3"

[lints]
workspace = true

[dev-dependencies]
assert_cmd = "2.0"
predicates = "3.1"
tempfile = "3.12"
serial_test = "3"
zip = "2.4"
serde_json = "1.0"

# Explicit test targets (autotests = false to exclude support/ directory)
[[test]]
name = "cli_flags_features_info"
path = "tests/cli_flags_features_info.rs"

