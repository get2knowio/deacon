# cargo-nextest configuration for deacon workspace
# Manages test parallelization and grouping for optimal performance

# Minimum supported nextest version for these features
nextest-version = "0.9.111"

# Test groups organize tests by resource requirements and execution constraints
[test-groups]

# Docker-exclusive: Tests that require exclusive Docker daemon access
# These tests create/destroy containers and must not run concurrently
docker-exclusive = { max-threads = 1 }

# Docker-slow-shared: Heavy Docker tests that can overlap once isolation is fixed
docker-slow-shared = { max-threads = 2 }

# Docker-shared: Tests that interact with Docker but can share daemon access
# Increased concurrency for short-lived CLI-level Docker cases
docker-shared = { max-threads = 8 }

# FS-heavy: Tests performing significant filesystem operations
# Limited concurrency to avoid I/O contention
fs-heavy = { max-threads = 4 }
# Host-only environment probe tests: lightweight host shell probing
env-probe = { max-threads = 12 }
# Long-running tests: heavy end-to-end or build-with-large-context tests
long-running = { max-threads = 2 }

# Smoke tests: split lightweight vs heavy daemon cases for higher parallelism
smoke-lite = { max-threads = 4 }
smoke-heavy = { max-threads = 2 }

# CLI-only smoke tests: safe to run in parallel with light throttling
smoke-cli = { max-threads = 8 }

# Parity tests: Tests comparing behavior with upstream devcontainers CLI
# Mildly throttled to allow overlap while avoiding daemon contention
parity = { max-threads = 2 }

# CLI-only parity tests
parity-cli = { max-threads = 8 }

# Dev-only `deacon-conformance` hermetic test binaries — `registry_valid`,
# `classification_join`, `inventory_*`, `gap_certification`, `traceability`, the
# 021-normative-clause-inventory binaries `clause_extraction` / `clause_determinism` /
# `clause_baseline` / `clause_diff` / `clause_classification_join`, and the
# 022-conformance-runner binaries `case_schema_valid` / `snapshot_staleness` /
# `allowed_difference_scoping` / `normalization_semantics` (conformance crate) plus
# `runner_record_replay` (parity-harness crate) — carry NO override: they are fast,
# non-docker, non-network, no-model tests that run in EVERY profile (default / dev-fast /
# full / ci) by default (they are neither in any `default-filter` exclusion nor a
# docker/smoke group; `runner_record_replay` does not match `binary(#parity_*)`, so it is
# NOT captured by the live-parity exclusions). This is the standing convention for
# conformance tests; the four new hermetic conformance binaries + `runner_record_replay`
# follow it (T004). The live differential binary `parity_conformance_runner` (US1, T026)
# is the ONLY 022 binary that gets per-profile overrides, added in US1 (T027).

# Default profile: Balanced parallelization for local development
[profile.default]
retries = 0
slow-timeout = "60s"
status-level = "pass"
# Live parity scenario binaries run ONLY under `--profile parity` (018-harden-parity-harness).
# Exclude them here so the default lane is truthful by non-selection (FR-014).
default-filter = 'not (binary(=parity_read_configuration) | binary(=parity_exec) | binary(=parity_build) | binary(=parity_up_exec) | binary(=parity_observable_state) | binary(=parity_state_diff) | binary(=parity_corpus_tier1) | binary(=parity_corpus_merged) | binary(=parity_corpus_errors) | binary(=parity_conformance_runner))'

[[profile.default.overrides]]
filter = 'binary(=smoke_exec) | binary(=smoke_exec_stdin) | binary(=smoke_up_idempotent) | binary(=smoke_down) | binary(=smoke_spinner) | binary(=smoke_lifecycle)'
test-group = 'smoke-heavy'
slow-timeout = { period = "10m", terminate-after = 1 }

[[profile.default.overrides]]
filter = 'binary(#smoke_*) & not (binary(=smoke_exec) | binary(=smoke_exec_stdin) | binary(=smoke_up_idempotent) | binary(=smoke_down) | binary(=smoke_spinner) | binary(=smoke_lifecycle))'
test-group = 'smoke-lite'
slow-timeout = { period = "10m", terminate-after = 1 }

[[profile.default.overrides]]
filter = 'binary(=smoke_cli)'
test-group = 'smoke-cli'
slow-timeout = { period = "5m", terminate-after = 1 }

[[profile.default.overrides]]
filter = 'binary(=up_dotfiles)'
test-group = 'docker-exclusive'
slow-timeout = { period = "5m", terminate-after = 1 }

[[profile.default.overrides]]
filter = 'binary(=up_prebuild) | binary(=run_user_commands_prebuild) | binary(=run_user_commands_feature_lifecycle) | binary(=lifecycle_parallel_output) | binary(=up_reconnect_full_id) | binary(=up_keepalive_path)'
test-group = 'docker-exclusive'
slow-timeout = { period = "10m", terminate-after = 1 }

# integration_auto_forward binds real host ports (static `-p` and the user-space
# forwarder's loopback listeners), so it must NOT run concurrently with other
# port-publishing docker tests — serialize it (docker-exclusive). Per T033.
[[profile.default.overrides]]
filter = 'binary(=integration_auto_forward)'
test-group = 'docker-exclusive'
slow-timeout = { period = "10m", terminate-after = 1 }

# Build consistency tests use Docker buildx and can conflict with parallel builds
[[profile.default.overrides]]
filter = 'binary(=build_consistency)'
test-group = 'docker-exclusive'
slow-timeout = { period = "5m", terminate-after = 1 }

[[profile.default.overrides]]
filter = 'binary(#parity_*) & not (binary(=parity_harness_faults) | binary(=parity_registry_check))'
test-group = 'parity'

# Hermetic harness self-tests + parity-harness integration tests (018 US5, T046):
# fs-heavy (bounded I/O for the stub-driven exec + fixture tests). NONE of these
# are selected by [profile.parity]. `parity_registry_check` + `normalize_consistency`
# intentionally stay ungrouped (default group).
[[profile.default.overrides]]
filter = 'binary(=parity_harness_faults) | binary(=aggregator) | binary(=raw_outputs)'
test-group = 'fs-heavy'

# parity_observable_state runs multiple up/down cycles against a real Docker
# daemon per test (including an OCI feature fetch and a two-CLI handoff
# matrix), longer-running than the other parity_* binaries.
[[profile.default.overrides]]
filter = 'binary(=parity_observable_state)'
test-group = 'parity'
slow-timeout = { period = "15m", terminate-after = 1 }

# parity_state_diff brings each fixture up with BOTH CLIs (including an OCI
# feature build on the compose fixture) to diff normalized container state.
[[profile.default.overrides]]
filter = 'binary(=parity_state_diff)'
test-group = 'parity'
slow-timeout = { period = "15m", terminate-after = 1 }

[[profile.default.overrides]]
filter = 'binary(=parity_read_configuration)'
test-group = 'parity-cli'

# consistency_remote_env_flags / consistency_env_probe_flag (renamed from
# parity_* in US2, research D9): reclassified as internal-consistency (no oracle),
# they leave the parity-cli group and run ungrouped in the fast/default lanes.

[[profile.default.overrides]]
filter = 'binary(#integration_env_probe_*)'
test-group = 'docker-shared'

[[profile.default.overrides]]
filter = 'binary(=integration_exec_selection) | binary(=integration_exec_id_label)'
test-group = 'docker-shared'
slow-timeout = { period = "5m", terminate-after = 1 }

# integration_up_build_options tests are CLI-only (no actual Docker container operations)
# They test argument parsing and BuildOptions/BuildKitOptions behavior without spawning containers
[[profile.default.overrides]]
filter = 'binary(=integration_up_build_options)'
test-group = 'smoke-cli'
slow-timeout = "60s"

[[profile.default.overrides]]
filter = 'binary(=integration_build) | binary(=integration_build_output) | binary(=integration_build_args) | binary(=integration_vulnerability_scan) | binary(#integration_up_*) | binary(=integration_progress) | binary(=integration_host_ca_runtime) | binary(=integration_host_ca_build)'
test-group = 'docker-slow-shared'
slow-timeout = { period = "30m", terminate-after = 1 }

[[profile.default.overrides]]
filter = 'binary(=integration_host_requirements) | binary(=integration_port_forwarding) | binary(=integration_feature_security) | binary(=integration_feature_lifecycle) | binary(=integration_feature_mounts) | binary(=integration_feature_entrypoints) | binary(=integration_compose_features_build) | binary(=integration_compose_config_mounts) | binary(=docker_channels)'
test-group = 'docker-shared'

[[profile.default.overrides]]
filter = 'binary(=integration_gpu_detection) | binary(=up_gpu_all) | binary(=up_gpu_detect) | binary(=up_gpu_none) | binary(=up_gpu_edge_cases) | binary(=up_gpu_consistency) | binary(=up_gpu_output)'
test-group = 'docker-shared'

[[profile.default.overrides]]
filter = 'binary(=integration_up_force_tty_if_json)'
test-group = 'docker-shared'
slow-timeout = { period = "10m", terminate-after = 1 }

# Compose features (bead 14a/14b): pull an OCI feature, run BuildKit, and
# bring up a compose project. Slow due to feature download + image build.
[[profile.default.overrides]]
filter = 'binary(=integration_compose_features_build)'
test-group = 'docker-shared'
slow-timeout = { period = "10m", terminate-after = 1 }

[[profile.default.overrides]]
filter = 'binary(=integration_config) | binary(=integration_layered_merge) | binary(=integration_lockfile) | binary(=integration_templates) | binary(=up_lockfile_frozen) | binary(=integration_profiles)'
test-group = 'fs-heavy'
slow-timeout = "5m"

[[profile.default.overrides]]
filter = 'binary(=integration_trust)'
test-group = 'fs-heavy'
slow-timeout = "2m"

[[profile.default.overrides]]
filter = 'binary(=smoke_exec) | binary(=smoke_exec_stdin) | binary(=smoke_up_idempotent) | binary(=smoke_down) | binary(=integration_build) | binary(=integration_build_output) | binary(=integration_vulnerability_scan) | binary(#integration_up_*) | binary(=integration_progress) | binary(=up_dotfiles)'
priority = 100

# Fast feedback loop profile: skip smoke/parity suites, Docker tests, and testcontainers tests
[profile.dev-fast]
retries = 0
slow-timeout = "30s"
# Exclude: smoke, parity, Docker-dependent tests, testcontainers-based tests
default-filter = 'not (binary(#smoke_*) | (binary(#parity_*) & not (binary(=parity_harness_faults) | binary(=parity_registry_check))) | binary(=build_consistency) | binary(=integration_build) | binary(=integration_build_output) | binary(=integration_build_args) | binary(=integration_vulnerability_scan) | binary(#integration_up_*) | binary(=integration_progress) | binary(#integration_env_probe_*) | test(/^env_probe::tests::/) | binary(=integration_exec_id_label) | binary(=integration_exec_selection) | binary(=testcontainers_helpers) | binary(=workspace_mounts) | binary(=up_prebuild) | binary(=run_user_commands_prebuild) | binary(=run_user_commands_feature_lifecycle) | binary(=lifecycle_parallel_output) | binary(=up_reconnect_full_id) | binary(=up_keepalive_path) | binary(=up_dotfiles) | binary(=integration_feature_lifecycle) | binary(=integration_feature_security) | binary(=integration_feature_mounts) | binary(=integration_compose_features_build) | binary(=integration_compose_config_mounts) | binary(=integration_auto_forward) | binary(=integration_host_ca_runtime) | binary(=integration_host_ca_build) | binary(=docker_channels))'

[[profile.dev-fast.overrides]]
filter = 'binary(=smoke_exec) | binary(=smoke_exec_stdin) | binary(=smoke_up_idempotent) | binary(=smoke_down) | binary(=smoke_spinner) | binary(=smoke_lifecycle)'
test-group = 'smoke-heavy'

[[profile.dev-fast.overrides]]
filter = 'binary(#smoke_*) & not (binary(=smoke_exec) | binary(=smoke_exec_stdin) | binary(=smoke_up_idempotent) | binary(=smoke_down) | binary(=smoke_spinner) | binary(=smoke_lifecycle))'
test-group = 'smoke-lite'

[[profile.dev-fast.overrides]]
filter = 'binary(=smoke_cli)'
test-group = 'smoke-cli'

[[profile.dev-fast.overrides]]
filter = 'binary(=up_dotfiles)'
test-group = 'docker-exclusive'

[[profile.dev-fast.overrides]]
filter = 'binary(=up_prebuild) | binary(=run_user_commands_prebuild) | binary(=run_user_commands_feature_lifecycle) | binary(=lifecycle_parallel_output) | binary(=up_reconnect_full_id) | binary(=up_keepalive_path)'
test-group = 'docker-exclusive'

# integration_auto_forward binds real host ports — serialize it (see default profile).
[[profile.dev-fast.overrides]]
filter = 'binary(=integration_auto_forward)'
test-group = 'docker-exclusive'

# Build consistency tests use Docker buildx and can conflict with parallel builds
[[profile.dev-fast.overrides]]
filter = 'binary(=build_consistency)'
test-group = 'docker-exclusive'

[[profile.dev-fast.overrides]]
filter = 'binary(#parity_*) & not (binary(=parity_harness_faults) | binary(=parity_registry_check))'
test-group = 'parity'

# Hermetic harness self-tests + parity-harness integration tests (018 US5, T046):
