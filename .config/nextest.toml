# ---------------------------------------------------------------------------
# Parity profile (018-harden-parity-harness): the SINGLE sanctioned entry point
# for live parity certification (`cargo nextest run --profile parity`). Its
# default-filter selects EXACTLY the live parity scenario binaries; every other
# lane excludes them so those lanes are truthful by non-selection (FR-014). The
# 15 m slow-timeout is per TEST: the 2 min (config) / 15 min (lifecycle) bounds
# are enforced PER CLI INVOCATION inside the harness, while one test may run
# several cases across two CLIs. (The 3 corpus runners join this profile in US2.)
# ---------------------------------------------------------------------------
[profile.parity]
retries = 0
slow-timeout = { period = "15m", terminate-after = 1 }
status-level = "pass"
default-filter = 'binary(=parity_read_configuration) | binary(=parity_exec) | binary(=parity_build) | binary(=parity_up_exec) | binary(=parity_observable_state) | binary(=parity_state_diff) | binary(=parity_corpus_tier1) | binary(=parity_corpus_merged) | binary(=parity_corpus_errors) | binary(=parity_conformance_runner)'

# Config-only parity runners → parity-cli group. `parity_conformance_runner` (022,
# US1) drives the declarative runner over config-only read-configuration cases, so it
# is CLI-throttled like `parity_read_configuration`.
[[profile.parity.overrides]]
filter = 'binary(=parity_read_configuration) | binary(=parity_conformance_runner)'
test-group = 'parity-cli'

# Container-scenario parity runners → parity group (throttled, daemon-friendly).
[[profile.parity.overrides]]
filter = 'binary(=parity_exec) | binary(=parity_build) | binary(=parity_up_exec) | binary(=parity_observable_state) | binary(=parity_state_diff)'
test-group = 'parity'

# Config-only corpus runners (US2, T032): each is ONE #[test] running ~20-23
# cases across two CLIs, so the per-CLI 2 min / 15 min bounds are enforced INSIDE
# the harness while the per-test slow-timeout must accommodate the whole batch —
# 15 m, not the default. Config-only → parity-cli group.
[[profile.parity.overrides]]
filter = 'binary(=parity_corpus_tier1) | binary(=parity_corpus_merged) | binary(=parity_corpus_errors)'
test-group = 'parity-cli'
slow-timeout = { period = "15m", terminate-after = 1 }
