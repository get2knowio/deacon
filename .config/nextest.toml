priority = 100

# Full profile: Run all tests with appropriate grouping
[profile.full]
retries = 0
# Mark tests as slow after 90s and terminate once (useful for interactive full runs)
slow-timeout = { period = "90s", terminate-after = 1 }
status-level = "none"
# Live parity scenario binaries run ONLY under `--profile parity` (018-harden-parity-harness).
# Exclude them here so even the "full" lane is truthful by non-selection (FR-014).
default-filter = 'not (binary(=parity_read_configuration) | binary(=parity_exec) | binary(=parity_build) | binary(=parity_up_exec) | binary(=parity_observable_state) | binary(=parity_state_diff) | binary(=parity_corpus_tier1) | binary(=parity_corpus_merged) | binary(=parity_corpus_errors) | binary(=parity_conformance_runner))'

# Profile for long-running integration tests (heavy end-to-end builds)
[profile.long-running]
retries = 0
slow-timeout = { period = "30m", terminate-after = 1 }
status-level = "pass"
default-filter = 'binary(=integration_build) | binary(=integration_build_output) | binary(#integration_up_*) | binary(=integration_progress) | binary(=integration_vulnerability_scan)'

# integration_up_build_options tests are CLI-only (no actual Docker container operations)
[[profile.long-running.overrides]]
filter = 'binary(=integration_up_build_options)'
test-group = 'smoke-cli'
slow-timeout = "60s"

[[profile.long-running.overrides]]
filter = 'binary(=integration_build) | binary(=integration_build_output) | binary(#integration_up_*) | binary(=integration_progress) | binary(=integration_vulnerability_scan)'
test-group = 'docker-slow-shared'
slow-timeout = { period = "30m", terminate-after = 1 }

