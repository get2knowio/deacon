test-group = 'docker-exclusive'

[[profile.ci.overrides]]
filter = 'binary(=integration_features_test_json) | binary(=integration_features_publish) | binary(=integration_host_requirements) | binary(=integration_port_forwarding)'
test-group = 'docker-shared'
threads-required = 1

[[profile.ci.overrides]]
filter = 'binary(=integration_config) | binary(=integration_layered_merge) | binary(=integration_lockfile) | binary(=integration_templates)'
test-group = 'fs-heavy'
threads-required = 1

[[profile.ci.overrides]]
filter = 'binary(=smoke_exec) | binary(=smoke_exec_stdin) | binary(=smoke_up_idempotent) | binary(=smoke_down) | binary(=integration_build) | binary(#integration_up_*) | binary(=integration_progress) | binary(=up_dotfiles)'
priority = 100
